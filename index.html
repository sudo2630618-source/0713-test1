<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해양엘니뇨지수(ONI) 시각화 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent-elnino: #ef4444;
            --accent-lanina: #3b82f6;
            --accent-normal: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #3b82f6, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* 컨트롤러 패널 */
        .control-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        select {
            background-color: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* 상태 요약 지표 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            border-left: 5px solid var(--border-color);
        }

        .stat-card.elnino { border-left-color: var(--accent-elnino); }
        .stat-card.normal { border-left-color: var(--accent-normal); }
        .stat-card.lanina { border-left-color: var(--accent-lanina); }

        .stat-card h3 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .stat-card p {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stat-card span {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* 차트 영역 */
        .chart-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            height: 500px;
            width: 100%;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        @media (max-width: 768px) {
            .control-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .chart-card {
                height: 350px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>El Niño & La Niña Monitoring Dashboard</h1>
        <p>3개월 이동평균 해수면 온도 편차 지수(Oceanic Niño Index, ONI) 시각화 도구 (1950 - 2026)</p>
    </header>

    <div class="control-panel">
        <div class="filter-group">
            <label for="startYear">시작 연도:</label>
            <select id="startYear"></select>
            <label for="endYear">종료 연도:</label>
            <select id="endYear"></select>
        </div>
        <div class="filter-group">
            <span style="font-size: 0.85rem; color: var(--text-secondary);">
                기준: <span style="color: var(--accent-elnino); font-weight: bold;">엘니뇨 (≥ +0.5)</span> | 
                <span style="color: var(--accent-normal); font-weight: bold;">평상시</span> | 
                <span style="color: var(--accent-lanina); font-weight: bold;">라니냐 (≤ -0.5)</span>
            </span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card elnino">
            <h3>엘니뇨 기준값</h3>
            <p>+0.5 ℃ 이상</p>
            <span>해수면 온도 상승기</span>
        </div>
        <div class="stat-card normal">
            <h3>평상시 기준값</h3>
            <p>-0.5 ~ +0.5 ℃</p>
            <span>중립 상태 에피소드</span>

        <div class="stat-card lanina">

            <p>-0.5 ℃ 이하</p>
            <span>해수면 온도 하강기</span>
        </div>
    </div>

    <div class="chart-card">
        <canvas id="oniChart"></canvas>
    </div>
</div>

        { "Year": 2026, "DJF": -0.4, "JFM": -0.1, "FMA": 0.1, "MAM": 0.5, "AMJ": 1.0 }

    const monthsSeq = ["DJF", "JFM", "FMA", "MAM", "AMJ", "MJJ", "JJA", "JAS", "ASO", "SON", "OND", "NDJ"];
    let chartInstance = null;

    // 데이터 평탄화 함수 (일렬의 시계열 데이터로 가공)
    function processData(start, end) {
        const labels = [];
        const values = [];
        const colors = [];

        rawOniData.forEach(row => {
            if (row.Year >= start && row.Year <= end) {
                monthsSeq.forEach(month => {
                    // 데이터가 존재하는 월만 푸시 (예: 2026년은 AMJ 까지만 있음)
                    if (row[month] !== undefined) {
                        labels.push(`${row.Year} ${month}`);
                        values.push(row[month]);

                        // 엘니뇨 / 라니냐 / 평상시 색상 판정
                        if (row[month] >= 0.5) {
                            colors.push('rgba(239, 68, 68, 0.85)'); // 엘니뇨 빨강
                        } else if (row[month] <= -0.5) {
                            colors.push('rgba(59, 130, 246, 0.85)'); // 라니냐 파랑
                        } else {
                            colors.push('rgba(148, 163, 184, 0.4)');  // 평상시 회색
                        }
                    }
                });
            }
        });

        return { labels, values, colors };
    }

    // 셀렉트 필터 데이터 바인딩
    function initFilters() {
        const startSel = document.getElementById('startYear');
        const endSel = document.getElementById('endYear');
        const years = rawOniData.map(d => d.Year);

        years.forEach(year => {
            const opt1 = document.createElement('option');
            opt1.value = year;
            opt1.textContent = `${year}년`;
            startSel.appendChild(opt1);

            const opt2 = document.createElement('option');
            opt2.value = year;
            opt2.textContent = `${year}년`;
            endSel.appendChild(opt2);
        });

        // 기본값 세팅: 최근 15년간 (2011 ~ 2026)
        startSel.value = 2011;
        endSel.value = 2026;

        startSel.addEventListener('change', updateChart);
        endSel.addEventListener('change', updateChart);
    }

    // 차트 렌더링 함수
    function drawChart(labels, values, colors) {
        const ctx = document.getElementById('oniChart').getContext('2d');

        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'ONI 편차 (℃)',
                    data: values,
                    backgroundColor: colors,
                    borderColor: colors.map(c => c.replace('0.85', '1')),
                    borderWidth: 1,
                    barPercentage: 0.8,
                    categoryPercentage: 0.9
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false // 색상 구분이 다양하므로 기본 범례 비활성화
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const val = context.parsed.y;
                                let state = "평상시 (Neutral)";
                                if (val >= 0.5) state = "엘니뇨 (El Niño)";
                                if (val <= -0.5) state = "라니냐 (La Niña)";
                                return ` 편차: ${val > 0 ? '+' : ''}${val} ℃ (${state})`;
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        grid: {
                            color: '#334155'
                        },
                        ticks: {
                            color: '#94a3b8',
                            callback: function(value) {
                                return (value > 0 ? '+' : '') + value + '℃';
                            }
                        },
                        title: {
                            display: true,
                            text: '표층 수온 편차 (℃)',
                            color: '#94a3b8'
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#94a3b8',
                            maxRotation: 45,
                            minRotation: 45,
                            autoSkip: true,
                            maxTicksLimit: 30 // 모바일 및 데스크톱에서 가독성을 지키기 위해 라벨 생략 조절
                        }
                    }
                }
            }
        });
    }

    function updateChart() {
        const start = parseInt(document.getElementById('startYear').value);
        const end = parseInt(document.getElementById('endYear').value);

        // 예외 처리: 시작 연도가 종료 연도보다 클 경우 스왑
        if (start > end) {
            alert("시작 연도는 종료 연도보다 클 수 없습니다.");
            document.getElementById('startYear').value = end;
            return;
        }

        const { labels, values, colors } = processData(start, end);
        drawChart(labels, values, colors);
    }

    // 실행 초기화
    window.onload = () => {
        initFilters();
        updateChart();
    };
</script>
